<ion-content>
  <ion-header>
    <ion-toolbar>
      <ion-buttons slot="start">
        <ion-button routerLink="pag-principal">          
          <img src="../../assets/voltar-img.png" alt="">
        </ion-button>
      </ion-buttons>
    </ion-toolbar>
  </ion-header>

  <ion-card>
    <ion-list>
      <ion-item *ngFor="let produto of produtos" [routerLink]="['/produto', produto.idArtigo]">
        <ion-thumbnail slot="start">
          <img src="../../assets/placeholder.jpg" alt="">
        </ion-thumbnail>
        <ion-label>
          <h2>{{ produto.artigo }}</h2>
          <p>Modelo: {{ produto.modelo }}</p>
          <p>Marca: {{ produto.marca }}</p>
          <p>Preço: {{ produto.venda | currency }}</p>
          <p>Quantidade: {{ produto.qt }}</p>
        </ion-label>
      </ion-item>
    </ion-list>
  </ion-card>

  <div *ngIf="errorMsg" class="error-message">{{ errorMsg }}</div>
</ion-content>
